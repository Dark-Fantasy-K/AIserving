---
apiVersion: v1
kind: Namespace
metadata:
  name: yolo-pipeline
  labels:
    app: yolo-pipeline

---
# ============================================================
#  Pedestrian Service (Pod)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pedestrian
  namespace: yolo-pipeline
  labels:
    app: pedestrian
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pedestrian
  template:
    metadata:
      labels:
        app: pedestrian
        component: worker
    spec:
      containers:
      - name: pedestrian
        image: your-registry/pedestrian-service:latest
        ports:
        - containerPort: 50052
          name: grpc
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "3Gi"
        readinessProbe:
          exec:
            command: ["python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=5)"]
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=5)"]
          initialDelaySeconds: 60
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: pedestrian
  namespace: yolo-pipeline
  labels:
    app: pedestrian
spec:
  type: ClusterIP
  selector:
    app: pedestrian
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc

---
# ============================================================
#  Vehicle Service (Pod)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle
  namespace: yolo-pipeline
  labels:
    app: vehicle
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle
  template:
    metadata:
      labels:
        app: vehicle
        component: worker
    spec:
      containers:
      - name: vehicle
        image: your-registry/vehicle-service:latest
        ports:
        - containerPort: 50053
          name: grpc
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          exec:
            command: ["python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50053'); grpc.channel_ready_future(ch).result(timeout=5)"]
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50053'); grpc.channel_ready_future(ch).result(timeout=5)"]
          initialDelaySeconds: 30
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: vehicle
  namespace: yolo-pipeline
  labels:
    app: vehicle
spec:
  type: ClusterIP
  selector:
    app: vehicle
  ports:
  - port: 50053
    targetPort: 50053
    name: grpc

---
# ============================================================
#  Router Service (Pod)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: yolo-pipeline
  labels:
    app: router
    component: router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
        component: router
    spec:
      containers:
      - name: router
        image: your-registry/router-service:latest
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: PEDESTRIAN_SERVICE_ADDR
          value: "pedestrian.yolo-pipeline.svc.cluster.local:50052"
        - name: VEHICLE_SERVICE_ADDR
          value: "vehicle.yolo-pipeline.svc.cluster.local:50053"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "3Gi"
        readinessProbe:
          exec:
            command: ["python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
          initialDelaySeconds: 60
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: yolo-pipeline
  labels:
    app: router
spec:
  type: ClusterIP
  selector:
    app: router
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc

---
# ============================================================
#  Gateway (Pod - 对外 HTTP 入口)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: yolo-pipeline
  labels:
    app: gateway
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        component: gateway
    spec:
      containers:
      - name: gateway
        image: your-registry/gateway:latest
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: ROUTER_SERVICE_ADDR
          value: "router.yolo-pipeline.svc.cluster.local:50051"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: yolo-pipeline
  labels:
    app: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
    name: http
