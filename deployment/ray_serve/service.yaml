apiVersion: v1
kind: Service
metadata:
  name: ai-serving-ray
  namespace: ai-serving
  labels:
    app: ai-serving-ray
spec:
  type: NodePort
  selector:
    app: ai-serving-ray
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30801   # Ray Serve API: <tailscale-ip>:30801
    - name: dashboard
      port: 8265
      targetPort: 8265
      nodePort: 30265   # Ray dashboard: <tailscale-ip>:30265
