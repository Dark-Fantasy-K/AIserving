apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-serving-ray
  namespace: ai-serving
  labels:
    app: ai-serving-ray
spec:
  # Ray Serve manages internal replicas; keep 1 k8s pod (head node)
  replicas: 1
  selector:
    matchLabels:
      app: ai-serving-ray
  template:
    metadata:
      labels:
        app: ai-serving-ray
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-serving-ray
          image: ai-serving-ray:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8265
              name: dashboard
            - containerPort: 9999
              name: ray-metrics
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            # Bug fix 3: TRANSFORMERS_CACHE deprecated, removed
            - name: HF_HOME
              value: /app/model-cache
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger.observability.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: ai-serving-ray
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            # Ray: disable object store spilling warnings on small nodes
            - name: RAY_object_store_memory
              value: "200000000"
          volumeMounts:
            - name: model-cache
              mountPath: /app/model-cache
            # Bug fix 4: Ray object store needs >30% RAM in /dev/shm (default 64MB is far too small)
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2500Mi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
