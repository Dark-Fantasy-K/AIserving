# Traefik IngressRoute (k3s includes Traefik by default)
# Exposes ai-serving at http://<node-ip>/ai or http://<tailscale-ip>/ai
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-serving
  namespace: ai-serving
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-serving
                port:
                  number: 8000
