apiVersion: v1
kind: Service
metadata:
  name: ai-serving
  namespace: ai-serving
  labels:
    app: ai-serving
spec:
  type: NodePort
  selector:
    app: ai-serving
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800   # Access via <node-ip>:30800 or <tailscale-ip>:30800
