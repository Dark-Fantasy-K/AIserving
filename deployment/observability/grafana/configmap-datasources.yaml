apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.observability.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST

      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: http://jaeger.observability.svc.cluster.local:16686
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
