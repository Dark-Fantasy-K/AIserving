apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: observability
  labels:
    app: jaeger
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 30686   # Jaeger UI: <tailscale-ip>:30686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      nodePort: 30317   # OTLP gRPC ingest
    - name: otlp-http
      port: 4318
      targetPort: 4318
      nodePort: 30318   # OTLP HTTP ingest
    - name: jaeger-http
      port: 14268
      targetPort: 14268
    - name: metrics
      port: 14269
      targetPort: 14269
