# GKE 版 deployment — 与 k3s 版的差异：
#   1. imagePullPolicy: IfNotPresent（从 GCR 拉取，非本地镜像）
#   2. 去掉 control-plane toleration（GKE 无此节点角色）
#   3. 镜像地址由 deploy.sh 的 sed 替换注入
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-serving
  namespace: ai-serving
  labels:
    app: ai-serving
spec:
  replicas: 1
  # Recreate: 先删旧 Pod 再创建新 Pod
  # RWO PVC 只能同时挂载到一个节点，RollingUpdate 会导致 Multi-Attach 错误
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-serving
  template:
    metadata:
      labels:
        app: ai-serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-serving
          image: ai-serving:latest          # deploy.sh 会替换为 GCR 地址
          imagePullPolicy: IfNotPresent     # GKE: 从 GCR 拉取
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TRANSFORMERS_CACHE
              value: /app/model-cache
            - name: HF_HOME
              value: /app/model-cache
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger.observability.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: ai-serving
            - name: OTEL_TRACES_EXPORTER
              value: otlp
          volumeMounts:
            - name: model-cache
              mountPath: /app/model-cache
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
      imagePullSecrets:
        - name: gcr-pull-secret          # 由 deploy.sh 提前创建
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
